<!DOCTYPE html>
<html>
<head>
<title>F1 Live Timing | Grumble Strips</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: white; font-family: Arial, sans-serif; }
header { background: #e10600; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 1.4em; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
#session-info { font-size: 0.8em; opacity: 0.9; letter-spacing: 1px; }
#last-updated { font-size: 0.7em; color: #aaa; text-align: right; padding: 8px 20px; border-bottom: 1px solid #1a1a1a; }
table { width: 100%; border-collapse: collapse; }
thead { background: #111; color: #e10600; font-size: 0.7em; letter-spacing: 2px; text-transform: uppercase; }
thead td { padding: 10px 12px; }
tbody tr { border-bottom: 1px solid #1a1a1a; transition: background 0.2s; }
tbody tr:hover { background: #141414; }
tbody td { padding: 11px 12px; font-size: 0.9em; vertical-align: middle; }
.pos { font-weight: 900; font-size: 1.05em; width: 45px; color: #e10600; }
.pos-1 { color: gold; }
.pos-2 { color: silver; }
.pos-3 { color: #cd7f32; }
.driver-num { color: #666; font-size: 0.85em; width: 40px; }
.team-bar { width: 3px; height: 28px; border-radius: 2px; display: inline-block; margin-right: 8px; vertical-align: middle; }
.driver-name { font-weight: 700; font-size: 0.95em; }
.team-name { color: #666; font-size: 0.75em; display: block; margin-top: 2px; }
.gap { color: #e10600; font-size: 0.85em; font-family: monospace; width: 90px; }
.gap-leader { color: #888; font-size: 0.8em; }
.lap-time { font-family: monospace; font-size: 0.85em; color: #ccc; width: 90px; }
.lap-fastest { color: #b94fcb; font-weight: bold; }
.live-dot { display: inline-block; width: 8px; height: 8px; background: #00ff00; border-radius: 50%; margin-right: 6px; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
#no-session { text-align: center; padding: 60px 20px; color: #444; }
#no-session h2 { font-size: 1.2em; margin-bottom: 10px; color: #666; }
#no-session p { font-size: 0.85em; line-height: 1.8; }
#no-session a { color: #e10600; text-decoration: none; }
</style>
</head>
<body>
<header>
  <h1>🏎️ F1 Live Timing</h1>
  <div id="session-info">Grumble Strips</div>
</header>
<div id="last-updated"></div>
<table>
  <thead>
    <tr>
      <td>POS</td>
      <td>NO</td>
      <td>DRIVER</td>
      <td>GAP</td>
      <td>LAST LAP</td>
    </tr>
  </thead>
  <tbody id="timing">
    <tr><td colspan="5" style="text-align:center;padding:40px;color:#444">Loading timing data...</td></tr>
  </tbody>
</table>
<script>
// Full 2026 F1 Grid - 22 drivers
const drivers = {
  1:  { name: "Lando Norris",        team: "McLaren",         color: "#FF8000" },
  3:  { name: "Max Verstappen",      team: "Red Bull Racing", color: "#3671C6" },
  5:  { name: "Gabriel Bortoleto",   team: "Audi",            color: "#C6002A" },
  6:  { name: "Isack Hadjar",        team: "Racing Bulls",    color: "#6692FF" },
  10: { name: "Pierre Gasly",        team: "Alpine",          color: "#FF87BC" },
  11: { name: "Sergio Perez",        team: "Cadillac",        color: "#FFFFFF" },
  12: { name: "Kimi Antonelli",      team: "Mercedes",        color: "#27F4D2" },
  14: { name: "Fernando Alonso",     team: "Aston Martin",    color: "#358C75" },
  16: { name: "Charles Leclerc",     team: "Ferrari",         color: "#E8002D" },
  18: { name: "Lance Stroll",        team: "Aston Martin",    color: "#358C75" },
  23: { name: "Alexander Albon",     team: "Williams",        color: "#64C4FF" },
  27: { name: "Nico Hulkenberg",     team: "Audi",            color: "#C6002A" },
  30: { name: "Liam Lawson",         team: "Racing Bulls",    color: "#6692FF" },
  31: { name: "Esteban Ocon",        team: "Haas",            color: "#B6BABD" },
  41: { name: "Arvid Lindblad",      team: "Racing Bulls",    color: "#6692FF" },
  43: { name: "Franco Colapinto",    team: "Alpine",          color: "#FF87BC" },
  44: { name: "Lewis Hamilton",      team: "Ferrari",         color: "#E8002D" },
  55: { name: "Carlos Sainz",        team: "Williams",        color: "#64C4FF" },
  63: { name: "George Russell",      team: "Mercedes",        color: "#27F4D2" },
  77: { name: "Valtteri Bottas",     team: "Cadillac",        color: "#FFFFFF" },
  81: { name: "Oscar Piastri",       team: "McLaren",         color: "#FF8000" },
  87: { name: "Oliver Bearman",      team: "Haas",            color: "#B6BABD" },
};

function formatLapTime(seconds) {
  if (!seconds) return "—";
  const mins = Math.floor(seconds / 60);
  const secs = (seconds % 60).toFixed(3).padStart(6, "0");
  return mins > 0 ? `${mins}:${secs}` : `${secs}s`;
}

function formatGap(gap) {
  if (gap === null || gap === undefined) return "—";
  if (typeof gap === "string") return gap;
  return "+" + gap.toFixed(3) + "s";
}

async function updateTiming() {
  try {
    const [posRes, intRes, lapRes] = await Promise.all([
      fetch("https://api.openf1.org/v1/position?session_key=latest"),
      fetch("https://api.openf1.org/v1/intervals?session_key=latest"),
      fetch("https://api.openf1.org/v1/laps?session_key=latest")
    ]);

    const posData = await posRes.json();
    const intData = await intRes.json();
    const lapData = await lapRes.json();

    if (!posData || posData.length === 0) {
      document.getElementById("timing").innerHTML = `
        <tr><td colspan="5">
          <div id="no-session">
            <h2>⏳ No Live Session</h2>
            <p>Live timing will appear here during<br>F1 practice, qualifying and race sessions.<br><br>
            Check the <a href="https://www.formula1.com/en/racing/2026" target="_blank">2026 F1 Calendar</a> for next session times.</p>
          </div>
        </td></tr>`;
      return;
    }

    const latestPos = {};
    posData.forEach(d => {
      if (!latestPos[d.driver_number] || d.date > latestPos[d.driver_number].date) {
        latestPos[d.driver_number] = d;
      }
    });

    const latestInt = {};
    intData.forEach(d => {
      if (!latestInt[d.driver_number] || d.date > latestInt[d.driver_number].date) {
        latestInt[d.driver_number] = d;
      }
    });

    const fastestLap = {};
    lapData.forEach(d => {
      if (d.lap_duration) {
        if (!fastestLap[d.driver_number] || d.lap_duration < fastestLap[d.driver_number]) {
          fastestLap[d.driver_number] = d.lap_duration;
        }
      }
    });

    const allFastest = Math.min(...Object.values(fastestLap).filter(Boolean));
    const sorted = Object.values(latestPos).sort((a, b) => a.position - b.position);

    let html = "";
    sorted.forEach(d => {
      const driver = drivers[d.driver_number] || { name: "Driver #" + d.driver_number, team: "Unknown", color: "#555" };
      const posClass = d.position === 1 ? "pos pos-1" : d.position === 2 ? "pos pos-2" : d.position === 3 ? "pos pos-3" : "pos";
      const interval = latestInt[d.driver_number];
      const gap = d.position === 1
        ? '<span class="gap-leader">LEADER</span>'
        : `<span class="gap">${formatGap(interval?.gap_to_leader)}</span>`;
      const lapTime = fastestLap[d.driver_number];
      const isOverallFastest = lapTime && lapTime === allFastest;
      const lapDisplay = lapTime
        ? `<span class="lap-time ${isOverallFastest ? 'lap-fastest' : ''}">${formatLapTime(lapTime)}${isOverallFastest ? ' 🟣' : ''}</span>`
        : '<span class="lap-time">—</span>';

      html += `<tr>
        <td class="${posClass}">P${d.position}</td>
        <td class="driver-num">${d.driver_number}</td>
        <td>
          <span class="team-bar" style="background:${driver.color}"></span>
          <span class="driver-name">${driver.name}</span>
          <span class="team-name">${driver.team}</span>
        </td>
        <td>${gap}</td>
        <td>${lapDisplay}</td>
      </tr>`;
    });

    document.getElementById("timing").innerHTML = html;
    document.getElementById("last-updated").innerHTML =
      `<span class="live-dot"></span> Live · Updated ${new Date().toLocaleTimeString()}`;

  } catch(e) {
    document.getElementById("timing").innerHTML =
      '<tr><td colspan="5" style="text-align:center;padding:40px;color:#444">Connection error — retrying...</td></tr>';
  }
}

updateTiming();
setInterval(updateTiming, 5000);
</script>
</body>
</html>
